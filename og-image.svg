<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a6a67"/>
      <stop offset="100%" stop-color="#08514f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circle top right -->
  <circle cx="1050" cy="-60" r="320" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="1100" cy="80" r="180" fill="#ffffff" fill-opacity="0.04"/>
