    <path d="M20 88V46L50 24L80 46V88" stroke="#d5e7e4" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M36 60H64M36 74H64" stroke="#d5e7e4" stroke-width="5.5" stroke-linecap="round"/>
  </g>
