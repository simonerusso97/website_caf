  <!-- Services tags -->
  <rect x="96" y="556" width="106" height="40" rx="8" fill="#ffffff" fill-opacity="0.10"/>
  <text x="149" y="581" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">730</text>
  <rect x="218" y="556" width="106" height="40" rx="8" fill="#ffffff" fill-opacity="0.10"/>
  <text x="271" y="581" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">ISEE</text>
  <rect x="340" y="556" width="106" height="40" rx="8" fill="#ffffff" fill-opacity="0.10"/>
  <text x="393" y="581" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">INPS</text>
  <rect x="462" y="556" width="200" height="40" rx="8" fill="#ffffff" fill-opacity="0.10"/>
  <text x="562" y="581" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">Successioni</text>
